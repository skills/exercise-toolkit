name: Test Wait for Workflow Action

on:
  pull_request:
    paths:
      - "actions/wait-for-workflow/**"
      - ".github/workflows/_test-wait-for-workflow-action.yml"

permissions:
  contents: read
  actions: read

jobs:
  test-nonexistent-workflow:
    runs-on: ubuntu-latest
    name: Test Nonexistent Workflow Fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Test with non-existent workflow
        id: nonexistent
        uses: ./actions/wait-for-workflow
        with:
          workflow-id: this-workflow-does-not-exist.yml
          timeout: 10
        continue-on-error: true

      - name: Verify action failed as expected
        if: steps.nonexistent.outcome == 'failure'
        run: echo "✅ Action correctly failed when workflow doesn't exist"

      - name: Fail job if action didn't fail
        if: steps.nonexistent.outcome != 'failure'
        run: |
          echo "❌ Action should have failed but didn't"
          exit 1

  test-existing-workflow:
    runs-on: ubuntu-latest
    name: Test Current Workflow Status Handling
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Test current workflow reaches in_progress
        uses: ./actions/wait-for-workflow
        with:
          # Hardcoded to this workflow file.
          workflow-id: _test-wait-for-workflow-action.yml
          status: in_progress
          timeout: 20
          polling-interval: 5
          fail-on-timeout: true

      - name: Test current workflow timeout when waiting for completed status
        id: completed-timeout
        uses: ./actions/wait-for-workflow
        with:
          workflow-id: _test-wait-for-workflow-action.yml
          # This job is still running, so waiting for completed should time out.
          status: completed
          timeout: 10
          polling-interval: 5
          fail-on-timeout: true
        continue-on-error: true

      - name: Fail job if completed status check did not time out
        if: steps.completed-timeout.outcome != 'failure' || steps.completed-timeout.outputs.conclusion != 'timeout'
        run: |
          echo "Action should have timed out with failure when waiting for completed status"
          echo "outcome=${{ steps.completed-timeout.outcome }}"
          echo "conclusion=${{ steps.completed-timeout.outputs.conclusion }}"
          exit 1
